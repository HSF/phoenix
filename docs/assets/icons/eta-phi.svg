      <!-- Energy deposit blocks (filled) -->
      <rect x="9" y="3" width="6" height="6" fill="var(--phoenix-options-icon-path, #fff)" opacity="0.7" />
      <rect x="3" y="9" width="6" height="6" fill="var(--phoenix-options-icon-path, #fff)" opacity="0.35" />
      <rect x="15" y="15" width="6" height="6" fill="var(--phoenix-options-icon-path, #fff)" opacity="0.5" />
